<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nexus</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    header {
      background: #111827;
      padding: 20px 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
    }

    /* SEARCH BOX */
    .search-box {
      display: flex;
      gap: 5px;
    }

    .search-box input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      width: 200px;
    }

    .search-box button {
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #334155;
    }

    p {
      color: #94a3b8;
      margin-top: 8px;
      text-align: center;
    }

    /* GRID */
    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      display: block;
    }

    .card:hover {
      background: #334155;
      transform: translateY(-5px);
    }

    .tag {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 6px;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>

  <div class="topbar">
    <h1>The Nexus</h1>

    <div class="search-box">
      <input type="text" placeholder="Search articles...">
      <button>Search</button>
    </div>
  </div>

  <p>Scholarships • Geopolitics • History • Entertainment</p>
</header>

<div class="container">

  <a class="card" href="fully-funded-scholarships-2026.html">
    <h3>Top Fully Funded Scholarships for 2026</h3>
    <div class="tag">Scholarships</div>
  </a>

  <a class="card" href="geopolitics.html">
    <h3>Major Geopolitical Trends to Watch</h3>
    <div class="tag">Geopolitics</div>
  </a>

  <a class="card" href="history.html">
    <h3>The Rise and Fall of Great Civilizations</h3>
    <div class="tag">History</div>
  </a>

</div>

<footer>
  © 2026 The Nexus
</footer>

</body>
</html>
